name: Deploy to Windows Server

# 触发条件：推送 main/master 分支，或在 Actions 页面手动触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时保护（含服务器本地构建时间）
    steps:
      # 仅做一件事：SSH 到服务器执行 deploy.ps1
      # 所有构建（前端 build、后端 npm install）都在 Windows 服务器本地完成
      # 优势：
      #   1. CI 耗时从 5 分钟降到 30 秒（只触发，不构建）
      #   2. 避免跨平台构建问题（Ubuntu build -> Windows run）
      #   3. 网络占用极低（git pull 增量传输）
      #   4. 回滚简单（git reset --hard HEAD~1 即可）
      - name: Trigger Server-Side Deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          # 关键：script_stop=true 确保脚本失败时 Action 报红色（默认 false 会假绿）
          script_stop: true
          # debug=true 输出完整 SSH 会话日志（排查问题用）
          debug: true
          # SSH 命令超时设置（避免长时间构建被截断）
          timeout: 60s           # TCP 连接超时
          command_timeout: 30m   # 命令执行超时（含 npm install + build + 健康检查）
          # 部署流程（自更新版）：
          # workflow 自己先拉最新代码（带重试+镜像），确保 deploy.ps1 是最新版，再执行它
          # 这样 deploy.ps1 有 bug 时，下次 push 后 workflow 会先拉到新版 deploy.ps1 再执行
          # 彻底消除"deploy.ps1 有 bug 需要手动到服务器拉代码"的痛点
          #
          # 为什么 workflow 也要做 git fetch（和 deploy.ps1 里的逻辑重复）:
          #   - 可靠性 > DRY 原则：workflow 的 fetch 确保 deploy.ps1 是最新版，
          #     deploy.ps1 的 fetch 作为本地手动部署时的兜底，两者互为补充
          #   - fetch 是幂等的，重复执行无害
          #
          # 为什么必须用 PowerShell 而不是 cmd:
          #   1. git 不在 cmd 的 PATH 里（drone-ssh 走 cmd.exe 时 PATH 不完整）
          #   2. cmd /c "a && b" 的 & 是 special char，引号被剥离，&& 被拆成多行执行（假绿）
          #   PowerShell 合并用户 PATH + 系统 PATH，能找到 git，且 $LASTEXITCODE 检查可靠
          #
          # 引号策略：
          #   - 外层双引号（cmd 传给 powershell -Command 的参数）
          #   - 内层路径用单引号（PowerShell 单引号字符串，不需要转义）
          #
          # 失败传播：
          #   - $ErrorActionPreference='Stop' 让 Set-Location 失败时抛异常终止
          #   - 每个外部命令后检查 $LASTEXITCODE，非 0 则 exit 1
          #
          # 部署流程：
          # 1. Set-Location 切换到项目目录
          # 2. git fetch（带重试+镜像兜底，最多 6 次尝试）拉取最新代码
          # 3. git reset --hard origin/main 同步代码（包括最新的 deploy.ps1）
          # 4. 执行 deploy.ps1（内部会再次 fetch，幂等无害；然后做 npm/build/pm2/健康检查）
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; Set-Location 'C:\Users\Administrator\Desktop\re_xiuxian'; Write-Host '[INFO] PWD:'(Get-Location); $env:GIT_TERMINAL_PROMPT=0; $o=git remote get-url origin; if(-not $o){Write-Host '[FATAL] No git remote';exit 1}; $m=@('https://github.com','https://ghfast.top/https://github.com','https://ghproxy.net/https://github.com'); $f=$false; foreach($x in $m){ $u=$o -replace 'https://github\.com',$x; if($u -eq $o -and $x -ne 'https://github.com'){continue}; Write-Host '[TRY] Fetch via:'$x; for($i=1;$i -le 2;$i++){ try{ if($x -ne 'https://github.com'){git remote set-url origin $u}; git fetch --all --prune 2>&1|Out-Host; if($LASTEXITCODE -eq 0){$f=$true;break} } finally{ if($x -ne 'https://github.com'){git remote set-url origin $o 2>$null} }; if($i -lt 2){Write-Host '[WARN] Fetch attempt '$i' failed, retry in 5s';Start-Sleep -Seconds 5} }; if($f){break} }; if(-not $f){Write-Host '[FATAL] All fetch attempts failed';exit 1}; git reset --hard origin/main; if($LASTEXITCODE -ne 0){Write-Host '[FATAL] git reset failed';exit 1}; Write-Host '[INFO] HEAD:'(git rev-parse --short HEAD); & '.\scripts\deploy.ps1'; if($LASTEXITCODE -ne 0){Write-Host '[FATAL] deploy.ps1 failed';exit 1}"
