name: Deploy to Windows Server

# 触发条件：推送 main/master 分支，或在 Actions 页面手动触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时保护（含服务器本地构建时间）
    steps:
      # 仅做一件事：SSH 到服务器执行 deploy.ps1
      # 所有构建（前端 build、后端 npm install）都在 Windows 服务器本地完成
      # 优势：
      #   1. CI 耗时从 5 分钟降到 30 秒（只触发，不构建）
      #   2. 避免跨平台构建问题（Ubuntu build -> Windows run）
      #   3. 网络占用极低（git pull 增量传输）
      #   4. 回滚简单（git reset --hard HEAD~1 即可）
      - name: Trigger Server-Side Deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          # SSH 命令超时设置（避免长时间构建被截断）
          timeout: 60s           # TCP 连接超时
          command_timeout: 30m   # 命令执行超时（含 npm install + build + 健康检查）
          # 部署流程：
          # 1. cd 到项目目录
          # 2. git fetch + git reset 更新代码（包括 deploy.ps1 自身，解决鸡生蛋问题）
          # 3. 执行新版 deploy.ps1（英文版，无编码问题）
          # deploy.ps1 内部会再次 git fetch（带镜像加速，幂等无害）
          script: |
            cd "C:\Users\Administrator\Desktop\re_xiuxian"
            git fetch --all
            git reset --hard origin/main
            powershell -ExecutionPolicy Bypass -File "C:\Users\Administrator\Desktop\re_xiuxian\scripts\deploy.ps1"
