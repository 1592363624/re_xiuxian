name: Deploy to Windows Server

# 触发条件：推送 main/master 分支，或在 Actions 页面手动触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时保护（含服务器本地构建时间）
    steps:
      # 仅做一件事：SSH 到服务器执行 deploy.ps1
      # 所有构建（前端 build、后端 npm install）都在 Windows 服务器本地完成
      # 优势：
      #   1. CI 耗时从 5 分钟降到 30 秒（只触发，不构建）
      #   2. 避免跨平台构建问题（Ubuntu build -> Windows run）
      #   3. 网络占用极低（git pull 增量传输）
      #   4. 回滚简单（git reset --hard HEAD~1 即可）
      - name: Trigger Server-Side Deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          # 关键：script_stop=true 确保脚本失败时 Action 报红色（默认 false 会假绿）
          script_stop: true
          # debug=true 输出完整 SSH 会话日志（排查问题用）
          debug: true
          # SSH 命令超时设置（避免长时间构建被截断）
          timeout: 60s           # TCP 连接超时
          command_timeout: 30m   # 命令执行超时（含 npm install + build + 健康检查）
          # 部署流程（PowerShell 版）：
          # 为什么必须用 PowerShell 而不是 cmd:
          #   1. git 不在 cmd 的 PATH 里（drone-ssh 走 cmd.exe 时 PATH 不完整），
          #      导致 'git' 不是内部或外部命令
          #   2. cmd /c "cmd1 && cmd2" 的引号规则有坑：& 是 cmd 的 special character，
          #      导致引号被剥离，&& 被拆成多行执行，cd 失败后后续命令仍执行（假绿）
          #   PowerShell 合并了用户 PATH + 系统 PATH，能找到 git，且 $LASTEXITCODE 检查可靠
          #
          # 引号策略：
          #   - 外层双引号（cmd 传给 powershell -Command 的参数）
          #   - 内层路径用单引号（PowerShell 单引号字符串，不需要转义）
          #   - cmd 不解释双引号内的 $ ( ) 等字符，会原样传给 PowerShell
          #
          # 失败传播：
          #   - $ErrorActionPreference='Stop' 让 Set-Location 失败时抛异常终止
          #   - 每个外部命令后检查 $LASTEXITCODE，非 0 则 exit 1
          #
          # 部署流程：
          # 1. Set-Location 切换到项目目录（失败则抛异常终止）
          # 2. git fetch + git reset 更新代码（包括 deploy.ps1 自身）
          # 3. 执行 deploy.ps1（内部有完整流程：杀端口/npm install/build/pm2 start/健康检查）
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference='Stop'; Set-Location 'C:\Users\Administrator\Desktop\re_xiuxian'; Write-Host '[INFO] PWD:'(Get-Location); Write-Host '[INFO] User:'$env:USERNAME; git fetch --all; if($LASTEXITCODE -ne 0){Write-Host '[FATAL] git fetch failed'; exit 1}; git reset --hard origin/main; if($LASTEXITCODE -ne 0){Write-Host '[FATAL] git reset failed'; exit 1}; Write-Host '[INFO] HEAD:'(git rev-parse --short HEAD); & '.\scripts\deploy.ps1'; if($LASTEXITCODE -ne 0){Write-Host '[FATAL] deploy.ps1 failed'; exit 1}"
