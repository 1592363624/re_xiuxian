name: Deploy to Windows Server

# 触发条件：推送 main/master 分支，或在 Actions 页面手动触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时保护（含服务器本地构建时间）
    steps:
      # 仅做一件事：SSH 到服务器执行 deploy.ps1
      # 所有构建（前端 build、后端 npm install）都在 Windows 服务器本地完成
      # 优势：
      #   1. CI 耗时从 5 分钟降到 30 秒（只触发，不构建）
      #   2. 避免跨平台构建问题（Ubuntu build -> Windows run）
      #   3. 网络占用极低（git pull 增量传输）
      #   4. 回滚简单（git reset --hard HEAD~1 即可）
      - name: Trigger Server-Side Deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          # 关键：script_stop=true 确保脚本失败时 Action 报红色（默认 false 会假绿）
          script_stop: true
          # debug=true 输出完整 SSH 会话日志（排查问题用）
          debug: true
          # SSH 命令超时设置（避免长时间构建被截断）
          timeout: 60s           # TCP 连接超时
          command_timeout: 30m   # 命令执行超时（含 npm install + build + 健康检查）
          # 部署流程（cmd && 链式失败传播版）：
          # 关键修复：原来用 cd + 多行命令，cmd 下 cd 失败后后续命令仍在错误目录执行，
          #           且 Windows OpenSSH 的 script_stop 对 cmd 多行命令不严格生效，导致"假绿"。
          # 现在改为：用 && 链式连接，任何一步失败立即停止，cmd 整体退出码非 0，ssh-action 报红。
          # 为什么不用 PowerShell -Command 单行：双引号嵌套转义在 cmd -> PowerShell 传递时易出错。
          # 为什么不用多行 + script_stop：drone-ssh 把整个 script 作为 here-doc 发送，
          #   script_stop 在 Windows cmd 多行命令下不严格生效，无法可靠捕获每行退出码。
          # 部署流程：
          # 1. cd /d 切换到项目目录（/d 同时切换驱动器，路径不存在则 cd 失败，&& 阻止后续）
          # 2. 输出诊断信息（PWD / USERNAME，方便排查环境问题）
          # 3. git fetch + git reset 更新代码（包括 deploy.ps1 自身）
          # 4. 输出当前 HEAD commit（确认代码已更新）
          # 5. 执行 deploy.ps1（内部有完整兜底检查 + 健康检查 + 回滚）
          # 路径无空格，不需要双引号，避免 YAML/cmd 双引号转义问题
          script: |
            cmd /c "cd /d C:\Users\Administrator\Desktop\re_xiuxian && echo [INFO] PWD: %CD% && echo [INFO] User: %USERNAME% && git fetch --all && git reset --hard origin/main && echo [INFO] HEAD: && git rev-parse --short HEAD && powershell -NoProfile -ExecutionPolicy Bypass -File scripts\deploy.ps1"
