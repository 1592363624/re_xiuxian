name: Deploy to Windows Server

# 触发条件：推送 main/master 分支，或在 Actions 页面手动触发
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 超时保护，避免 SSH 挂死
    steps:
      # 仅做一件事：SSH 到服务器执行 deploy.ps1
      # 所有构建（前端 build、后端 npm install）都在 Windows 服务器本地完成
      # 优势：
      #   1. CI 耗时从 5 分钟降到 30 秒（只触发，不构建）
      #   2. 避免跨平台构建问题（Ubuntu build -> Windows run）
      #   3. 网络占用极低（git pull 增量传输）
      #   4. 回滚简单（git reset --hard HEAD~1 即可）
      - name: Trigger Server-Side Deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          # 触发服务器上的部署脚本
          # deploy.ps1 会执行：git pull -> npm install -> build -> pm2 reload -> 健康检查
          script: |
            powershell -ExecutionPolicy Bypass -File "C:\Users\Administrator\Desktop\re_xiuxian\scripts\deploy.ps1"
